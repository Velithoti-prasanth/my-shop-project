<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="./../bootstrap-5.3.8-dist/css/bootstrap.css">

    <style>
        body {
            background: url(images/register.jpg);
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .card {
            background: transparent;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: white;
        }


        .card-header {
            background: transparent;
            border-bottom: none;
            text-align: center;
        }


        .form-control {
            border-radius: 10px;
            padding: 10px;
        }


        .btn-primary {
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
        }


        .form-label {
            font-weight: 500;
        }


        .form-control::placeholder {
            color: #888;
        }


        .btn-primary:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-5">
                <div class="card p-4">

                    <div class="card-header">
                        <h3>Create Account 📝</h3>
                        <p>Please fill in this form to create an account</p>
                    </div>

                    <div class="card-body">
                        <form>

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control bg-light" placeholder="Enter username">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" class="form-control bg-light" placeholder="Enter email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control bg-light" placeholder="Enter password">
                            </div>

                            <button type="button" class="btn btn-primary w-100"
                                onclick="window.location.href='index.html'">
                                Register
                            </button>

                            <p class="text-center mt-3">
                                Already have an account? <a href="login.html" class="text-white">Login</a>
                            </p>

                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
